<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio CupomClic - Fotos Profissionais com IA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background-color: #0b192c; color: #ffffff; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 650px; background: #1a2a40; padding: 30px; border-radius: 16px; border: 1px solid #d48a5c; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); align-self: center; text-align: center; }
        
        .logo { font-size: 22px; font-weight: 800; color: #d48a5c; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
        .tagline { color: #8fa0b5; font-size: 13px; margin-bottom: 25px; }
        
        .campo { margin-bottom: 18px; text-align: left; }
        label { color: #3b9b9b; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #3b9b9b; background: #0b192c; color: #ffffff; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #d48a5c; }
        
        button.btn-main { background: linear-gradient(135deg, #d48a5c 0%, #b37143 100%); color: #ffffff; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button.btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
        button.btn-main:disabled { background: #555; cursor: not-allowed; opacity: 0.6; transform: none; }

        /* ESTILOS DO LOADING (ANIMAÇÃO) */
        .loading-box {
            margin-top: 25px;
            padding: 20px;
            background: #0b192c;
            border: 1px solid #d48a5c;
            border-radius: 12px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(212, 138, 92, 0.2);
            border-top-color: #d48a5c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #d48a5c;
            font-weight: 700;
            font-size: 15px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading-subtext {
            color: #8fa0b5;
            font-size: 12px;
            margin-top: 5px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* CARD DE RESULTADO */
        .result-box { margin-top: 25px; background: #0b192c; border: 1px solid rgba(59, 155, 155, 0.4); border-radius: 12px; padding: 15px; }
        .result-img { width: 100%; height: auto; border-radius: 8px; border: 1px solid #3b9b9b; margin-top: 10px; }
        
        .btn-download { background: #3b9b9b; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; margin-top: 12px; text-decoration: none; display: inline-block; }
        .btn-download:hover { background: #2a7a7a; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📸 Estúdio CupomClic</div>
        <div class="tagline">Geração de Fotos Profissionais para o Comércio Local</div>

        <div class="campo">
            <label>1. Nome do Produto:</label>
            <input type="text" id="produtoInput" placeholder="Ex: Pizza de Calabresa com Borda Recheada">
        </div>

        <div class="campo">
            <label>2. Estilo da Foto:</label>
            <select id="estiloSelect">
                <option value="Estúdio Gastronômico com iluminação quente de restaurante">🍔 Gastronômico / Restaurante Premium</option>
                <option value="Vitrine de Loja de Roupas moderna e iluminada">👗 Moda / Vitrine Conceito</option>
                <option value="Foto Comercial limpa em estúdio com iluminação suave">📦 Produto Comercial (Fundo Estúdio)</option>
            </select>
        </div>

        <button class="btn-main" id="btnGerar" onclick="gerarFoto()">⚡ Criar Foto de Estúdio</button>

        <!-- CAIXA DE LOADING (ROLETA + MENSAGEM) -->
        <div id="loadingBox" class="loading-box hidden">
            <div class="spinner"></div>
            <div class="loading-text">Aguarde, estamos produzindo sua foto!</div>
            <div class="loading-subtext">A Inteligência Artificial está preparando a iluminação e o cenário...</div>
        </div>

        <!-- ÁREA DA FOTO GERADA -->
        <div id="resultBox" class="result-box hidden">
            <p style="color: #3b9b9b; font-size: 13px; font-weight: bold;">Sua foto ficou pronta! 🔥</p>
            <img id="fotoResultado" src="" alt="Foto Gerada" class="result-img">
            <a id="btnDownload" href="#" download="foto-cupomclic.jpg" class="btn-download">💾 Baixar Foto em Alta Resolução</a>
        </div>
    </div>

    <script>
        async function gerarFoto() {
            const produto = document.getElementById('produtoInput').value;
            const estilo = document.getElementById('estiloSelect').value;
            const btnGerar = document.getElementById('btnGerar');
            const loadingBox = document.getElementById('loadingBox');
            const resultBox = document.getElementById('resultBox');
            const fotoResultado = document.getElementById('fotoResultado');
            const btnDownload = document.getElementById('btnDownload');

            if (!produto) {
                alert("Por favor, digite o nome do produto!");
                return;
            }

            // 1. ATIVAR ESTADO DE LOADING E DESABILITAR O BOTÃO
            btnGerar.disabled = true;
            btnGerar.innerText = "⏳ Gerando...";
            loadingBox.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                // Chamada para a API Serverless na Vercel
                const response = await fetch('/api/generate-photo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ produto, estilo })
                });

                const data = await response.json();

                if (data.sucesso && data.imageUrl) {
                    // Exibe a imagem gerada
                    fotoResultado.src = data.imageUrl;
                    btnDownload.href = data.imageUrl;
                    resultBox.classList.remove('hidden');
                } else {
                    alert(data.erro || "Erro ao gerar a foto. Tente novamente.");
                }

            } catch (err) {
                alert("Erro de conexão com o servidor.");
            } finally {
                // 2. DESATIVAR LOADING E REABILITAR BOTÃO
                loadingBox.classList.add('hidden');
                btnGerar.disabled = false;
                btnGerar.innerText = "⚡ Criar Foto de Estúdio";
            }
        }
    </script>
</body>
</html>
