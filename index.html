<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio CupomClic</title>
    <style>
        body { font-family: sans-serif; background-color: #0b192c; color: white; text-align: center; padding: 50px; }
        .container { max-width: 500px; margin: 0 auto; background-color: #1a2a40; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo-marca { max-width: 250px; margin-bottom: 20px; border-radius: 8px; }
        h1 { color: #d48a5c; margin-bottom: 10px; }
        p { color: #8fa0b5; font-size: 14px; margin-bottom: 30px; }
        input[type="file"] { margin: 20px 0; color: #fff; }
        button { background-color: #3b9b9b; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background-color 0.3s; }
        button:hover { background-color: #2a7a7a; }
        #status { margin-top: 20px; font-weight: bold; color: #d48a5c; }
        .resultado-container { margin-top: 30px; display: none; }
        .resultado-img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 2px solid #d48a5c; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Caso a imagem quebre, confirme se o arquivo da sua logo está no repositório com o nome exato logo.png -->
        <img src="logo.png" alt="Logo CupomClic" class="logo-marca">
        
        <h1>Estúdio CupomClic</h1>
        <p>A inteligência artificial que transforma as fotos da sua loja.</p>
        
        <input type="file" id="fotoInput" accept="image/*" onchange="fotoAnexada()">
        <button onclick="enviarFoto()">Gerar Foto Profissional</button>

        <p id="status"></p>

        <!-- Bloco que armazena a foto generativa finalizada -->
        <div id="resultadoBloco" class="resultado-container">
            <h3>Seu Anúncio Profissional:</h3>
            <img id="fotoResultado" src="" alt="Produto CupomClic" class="resultado-img">
        </div>
    </div>

    <script>
        function fotoAnexada() {
            const input = document.getElementById('fotoInput');
            const status = document.getElementById('status');
            const bloco = document.getElementById('resultadoBloco');
            
            bloco.style.display = "none";
            if (input.files.length > 0) {
                status.innerText = "FOTO ANEXADA COM SUCESSO. CLIQUE EM GERAR";
                status.style.color = "#3b9b9b";
            } else {
                status.innerText = "";
            }
        }

        function enviarFoto() {
            const input = document.getElementById('fotoInput');
            const status = document.getElementById('status');
            const bloco = document.getElementById('resultadoBloco');
            const imgResultado = document.getElementById('fotoResultado');
            
            if (!input.files[0]) {
                status.innerText = "Nenhuma foto selecionada!";
                status.style.color = "#d48a5c";
                return;
            }

            status.innerText = "O Estúdio CupomClic está preparando a sua imagem...";
            status.style.color = "#d48a5c";

            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            
            reader.onload = async function () {
                const fotoTextoBase64 = reader.result;

                try {
                    const resposta = await fetch('/api/gerar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ imagem: fotoTextoBase64 })
                    });
                    
                    const resultado = await resposta.json();
                    
                    if (resultado.imagemResultado) {
                        status.innerText = resultado.mensagem;
                        status.style.color = "#3b9b9b";
                        imgResultado.src = resultado.imagemResultado;
                        bloco.style.display = "block";
                    } else {
                        status.innerText = resultado.erro || "Erro ao processar imagem.";
                    }
                } catch (erro) {
                    status.innerText = "Erro na comunicação com a IA.";
                }
            };
        }
    </script>
</body>
</html>
