<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estúdio CupomClic - Fotos Profissionais</title>
  <style>
    :root {
      --bg-color: #0d131a;
      --card-bg: #151d27;
      --input-bg: #0b0f14;
      --border-color: #243242;
      --text-main: #f0f4f8;
      --text-muted: #94a3b8;
      --accent-gold: #e69c5e;
      --accent-gold-hover: #d18749;
      --accent-blue: #38bdf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
    .container { width: 100%; max-width: 650px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin-top: 20px; }
    
    .logo-container { text-align: center; margin-bottom: 15px; }
    .logo-img { max-width: 200px; width: 100%; height: auto; border-radius: 8px; display: inline-block; }

    h1 { color: var(--accent-gold); font-size: 1.5rem; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; font-weight: bold; color: var(--accent-blue); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #1e3a5f; border-radius: 8px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: var(--accent-gold); }
    
    .btn-main { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent-gold), #c47c3e); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: transform 0.1s, opacity 0.2s; margin-top: 10px; }
    .btn-main:hover { opacity: 0.95; }
    .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

    /* LOADING ANIMADO */
    .loading-box { display: none; text-align: center; padding: 25px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-top: 25px; }
    .spinner { width: 45px; height: 45px; border: 4px solid var(--border-color); border-top: 4px solid var(--accent-gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { font-size: 0.95rem; color: var(--accent-gold); font-weight: bold; }
    .loading-subtext { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }

    /* ÁREA DE RESULTADOS */
    .results-container { margin-top: 25px; display: none; text-align: center; }
    .img-preview { width: 100%; max-width: 450px; border-radius: 12px; border: 2px solid var(--accent-gold); margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
    .btn-download { display: inline-block; width: 100%; text-align: center; background: var(--accent-gold); color: #000; padding: 12px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: background 0.2s; }
    .btn-download:hover { background: var(--accent-gold-hover); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="logo.png" alt="CupomClic" class="logo-img">
    </div>

    <h1>📸 ESTÚDIO CUPOMCLIC</h1>
    <p class="subtitle">Geração de Fotos Profissionais para o Comércio Local</p>

    <div class="form-group">
      <label>1. NOME DO PRODUTO:</label>
      <input type="text" id="produto" placeholder="Ex: Pizza de Calabresa com Borda Recheada">
    </div>

    <div class="form-group">
      <label>2. ESTILO DA FOTO:</label>
      <select id="estilo">
        <option value="gourmet">🍔 Gastronômico / Restaurante Premium</option>
        <option value="joias">💎 Joias & Acessórios de Luxo</option>
        <option value="moda">👗 Moda & Roupas Editorial</option>
        <option value="beleza">✨ Beleza & Cosméticos Spa</option>
        <option value="clean">🕶️ Lifestyle Clean & Outdoor</option>
        <option value="rustico">🌾 Rústico & Artesanal</option>
      </select>
    </div>

    <button id="btn-gerar" class="btn-main" onclick="gerarFoto()">⚡ Criar Foto de Estúdio</button>

    <div id="loading-box" class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text">🎨 Montando estúdio e iluminação (1080x1350)...</div>
      <div class="loading-subtext">A IA está gerando sua imagem do zero. Aguarde cerca de 10 a 15 segundos.</div>
    </div>

    <div id="results" class="results-container">
      <img id="foto-resultado" class="img-preview" src="" alt="Foto Gerada pela IA">
      <a id="btn-download" class="btn-download" href="#" download="estudio-cupomclic.jpg" target="_blank">⬇️ Baixar Foto em Alta Resolução (Instagram)</a>
    </div>
  </div>

  <script>
    async function gerarFoto() {
      const produto = document.getElementById('produto').value.trim();
      const estilo = document.getElementById('estilo').value;
      const btn = document.getElementById('btn-gerar');
      const loadingBox = document.getElementById('loading-box');
      const results = document.getElementById('results');
      const imgPreview = document.getElementById('foto-resultado');
      const btnDownload = document.getElementById('btn-download');

      if (!produto) {
        return alert('Digite o nome do produto!');
      }

      btn.disabled = true;
      btn.innerText = '⏳ Criando Foto...';
      results.style.display = 'none';
      loadingBox.style.display = 'block';

      try {
        const res = await fetch('/api/gerar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            produto: produto, 
            estilo: estilo 
          })
        });

        const data = await res.json();

        if (data.sucesso && data.imageUrl) {
          imgPreview.src = data.imageUrl;
          btnDownload.href = data.imageUrl;
          results.style.display = 'block';
        } else {
          alert(data.erro || 'Erro ao gerar imagem.');
        }
      } catch (err) {
        console.error("Erro na requisição:", err);
        alert('Erro de conexão ao gerar imagem.');
      } finally {
        loadingBox.style.display = 'none';
        btn.disabled = false;
        btn.innerText = '⚡ Criar Foto de Estúdio';
      }
    }
  </script>
</body>
</html>
